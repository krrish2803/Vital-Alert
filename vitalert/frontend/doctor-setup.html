<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VitalAlert — Doctor Setup</title>
  <link rel="stylesheet" href="assets/style.css">
  <style>
    .setup-subtitle { color: var(--text-secondary); font-size: 14px; text-align: center; margin-bottom: 28px; }
    .setup-footer { text-align: center; margin-top: 24px; font-size: 12px; color: var(--text-muted); }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <h1>VitalAlert</h1>
        <p>Complete Your Doctor Profile</p>
      </div>
      <p class="setup-subtitle">Set up your practice details to start receiving alerts</p>
      <form id="doctorSetupForm">
        <div class="form-group">
          <label class="form-label" for="docName">Full Name</label>
          <input class="form-input" type="text" id="docName" placeholder="Dr. Name" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="docSpecialization">Specialization</label>
          <input class="form-input" type="text" id="docSpecialization" placeholder="e.g. Cardiologist" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="docPhone">Phone Number</label>
          <input class="form-input" type="tel" id="docPhone" placeholder="+919876543210" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="docWhatsApp">WhatsApp Number</label>
          <input class="form-input" type="tel" id="docWhatsApp" placeholder="+919876543210" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="docBackup">Backup Contact (optional)</label>
          <input class="form-input" type="tel" id="docBackup" placeholder="Alternate phone number">
        </div>
        <div class="login-error" id="setupError"></div>
        <button type="submit" class="btn btn-primary btn-lg" style="width:100%" id="setupBtn">
          Save & Continue
        </button>
      </form>
      <div class="setup-footer">
        &copy; 2026 VitalAlert
      </div>
    </div>
  </div>
  <script>
    const API = '/api/v1';

    function getToken() { return localStorage.getItem('token'); }

    async function api(path, opts = {}) {
      const token = getToken();
      const headers = {};
      if (token) headers['Authorization'] = `Bearer ${token}`;
      Object.assign(headers, opts.headers || {});
      const res = await fetch(`${API}${path}`, { ...opts, headers });
      if (res.status === 401) { localStorage.clear(); window.location.href = 'index.html'; return null; }
      if (!res.ok) { const err = await res.json().catch(() => ({})); throw new Error(err.detail || 'API error'); }
      return res.json();
    }

    document.getElementById('doctorSetupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('setupBtn');
      const error = document.getElementById('setupError');
      error.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Saving...';

      try {
        await api('/doctors/setup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            name: document.getElementById('docName').value,
            phone: document.getElementById('docPhone').value,
            whatsapp_number: document.getElementById('docWhatsApp').value,
            specialization: document.getElementById('docSpecialization').value,
            backup_contact: document.getElementById('docBackup').value || null,
          }),
        });
        window.location.href = 'portal.html';
      } catch (err) {
        error.textContent = err.message;
        error.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Save & Continue';
      }
    });
  </script>
</body>
</html>
